<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <!-- House Icon -->
  <g id="house">
    <!-- Roof -->
    <path d="M 20 90 L 100 40 L 180 90 L 160 90 L 100 55 L 40 90 Z" fill="url(#goldGradient)" stroke="#d68910" stroke-width="3"/>
    <!-- Window -->
    <rect x="75" y="60" width="50" height="40" rx="5" fill="#f5f0e1"/>
    <line x1="100" y1="60" x2="100" y2="100" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="75" y1="80" x2="125" y2="80" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Base curve -->
    <path d="M 40 110 Q 100 90 160 110" fill="none" stroke="url(#goldGradient)" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
